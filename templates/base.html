<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory & Supply Chain</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<aside class="sidebar">
    <h2>Smart Inventory</h2>
    <nav>
        <a href="/" class="{{ 'active' if request.path == '/' else '' }}">Dashboard</a>
        <a href="/suppliers" class="{{ 'active' if request.path == '/suppliers' else '' }}">Suppliers</a>
        <a href="/products" class="{{ 'active' if request.path == '/products' else '' }}">Products</a>
        <a href="/warehouses" class="{{ 'active' if request.path == '/warehouses' else '' }}">Warehouses</a>
        <a href="/inventory" class="{{ 'active' if request.path == '/inventory' else '' }}">Inventory</a>
        <a href="/customers" class="{{ 'active' if request.path == '/customers' else '' }}">Customers</a>
        <a href="/orders" class="{{ 'active' if request.path == '/orders' else '' }}">Orders</a>
        <a href="/shipments" class="{{ 'active' if request.path == '/shipments' else '' }}">Shipments</a>
    </nav>
</aside>

<main class="main-content">
    {% block content %}{% endblock %}
</main>

<script src="{{ url_for('static', filename='script.js') }}"></script>
{% block scripts %}{% endblock %}

</body>
</html>
