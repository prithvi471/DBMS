{% extends 'base.html' %}

{% block content %}
<div class="header">
    <h1>Suppliers</h1>
    <button class="btn btn-primary" onclick="openSupplierModal()">Add Supplier</button>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Contact Person</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Address</th>
                <th>Rating</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="suppliers-body">
            <tr><td colspan="8">Loading...</td></tr>
        </tbody>
    </table>
</div>

<!-- Modal -->
<div id="supplier-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-title">Add Supplier</h2>
            <button class="close-btn" onclick="closeModal('supplier-modal')">&times;</button>
        </div>
        <form id="supplier-form" onsubmit="event.preventDefault(); saveSupplier();">
            <input type="hidden" name="supplier_id" id="supplier_id">
            <div class="form-group">
                <label>Supplier Name</label>
                <input type="text" name="supplier_name" id="supplier_name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Contact Person</label>
                <input type="text" name="contact_person" id="contact_person" class="form-control">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="number" name="phone" id="phone" class="form-control">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" id="email" class="form-control">
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" name="address" id="address" class="form-control">
            </div>
            <div class="form-group">
                <label>Rating (0.0 to 5.0)</label>
                <input type="number" step="0.1" name="rating" id="rating" class="form-control">
            </div>
            <button type="submit" class="btn btn-success">Save</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let editingId = null;

async function loadSuppliers() {
    try {
        const data = await apiRequest('/api/Supplier');
        const tbody = document.getElementById('suppliers-body');
        tbody.innerHTML = data.map(s => `
            <tr>
                <td>${s.supplier_id}</td>
                <td>${s.supplier_name}</td>
                <td>${s.contact_person || ''}</td>
                <td>${s.phone || ''}</td>
                <td>${s.email || ''}</td>
                <td>${s.address || ''}</td>
                <td>${s.rating || ''}</td>
                <td>
                    <button class="btn btn-outline" onclick='editSupplier(${JSON.stringify(s).replace(/'/g, "&apos;")})'>Edit</button>
                    <button class="btn btn-danger" onclick="deleteSupplier(${s.supplier_id})">Delete</button>
                </td>
            </tr>
        `).join('') || '<tr><td colspan="8">No suppliers found</td></tr>';
    } catch(e) {}
}

function openSupplierModal() {
    editingId = null;
    document.getElementById('supplier-form').reset();
    document.getElementById('supplier_id').value = '';
    document.getElementById('modal-title').textContent = 'Add Supplier';
    openModal('supplier-modal');
}

function editSupplier(s) {
    editingId = s.supplier_id;
    document.getElementById('supplier_id').value = s.supplier_id;
    document.getElementById('supplier_name').value = s.supplier_name;
    document.getElementById('contact_person').value = s.contact_person;
    document.getElementById('phone').value = s.phone;
    document.getElementById('email').value = s.email;
    document.getElementById('address').value = s.address;
    document.getElementById('rating').value = s.rating;
    document.getElementById('modal-title').textContent = 'Edit Supplier';
    openModal('supplier-modal');
}

async function saveSupplier() {
    const data = getFormData('supplier-form');
    // Remove empty id
    if (!data.supplier_id) delete data.supplier_id;
    
    if (editingId) {
        await submitForm(`/api/Supplier/${editingId}`, 'PUT', 'supplier-form', loadSuppliers);
    } else {
        await submitForm('/api/Supplier', 'POST', 'supplier-form', loadSuppliers);
    }
}

async function deleteSupplier(id) {
    if(confirm('Are you sure you want to delete this supplier?')) {
        try {
            await apiRequest(`/api/Supplier/${id}`, 'DELETE');
            loadSuppliers();
        } catch(e) {}
    }
}

document.addEventListener('DOMContentLoaded', loadSuppliers);
</script>
{% endblock %}
