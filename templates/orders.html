{% extends 'base.html' %}

{% block content %}
<div class="header">
    <h1>Orders</h1>
    <button class="btn btn-primary" onclick="openOrderModal()">Place New Order</button>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Customer Name</th>
                <th>Date</th>
                <th>Total Amount</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="orders-body">
            <tr><td colspan="6">Loading...</td></tr>
        </tbody>
    </table>
</div>

<!-- Modal -->
<div id="order-modal" class="modal">
    <div class="modal-content" style="max-width: 600px;">
        <div class="modal-header">
            <h2>Place New Order</h2>
            <button class="close-btn" onclick="closeModal('order-modal')">&times;</button>
        </div>
        <form id="order-form" onsubmit="event.preventDefault(); submitOrder();">
            <div class="form-group">
                <label>Customer</label>
                <select id="order-customer" class="form-control" required></select>
            </div>
            
            <div class="form-group">
                <label>Add Product</label>
                <div style="display: flex; gap: 10px;">
                    <select id="product-select" class="form-control" style="flex: 2;"></select>
                    <input type="number" id="product-qty" class="form-control" style="flex: 1;" placeholder="Qty" min="1">
                    <button type="button" class="btn btn-secondary" onclick="addOrderItem()">Add</button>
                </div>
            </div>
            
            <table style="margin-bottom: 20px;">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Qty</th>
                        <th>Subtotal</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="order-items-body"></tbody>
            </table>
            
            <div class="form-group" style="text-align: right;">
                <h3>Total: $<span id="order-total">0.00</span></h3>
            </div>
            
            <button type="submit" class="btn btn-success" id="btn-submit-order" disabled>Place Order</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allProducts = [];
let orderItems = [];

async function loadOrders() {
    try {
        const data = await apiRequest('/api/Orders');
        const tbody = document.getElementById('orders-body');
        tbody.innerHTML = data.map(o => `
            <tr style="cursor: pointer;" onclick="viewOrderDetails(${o.order_id}, event)">
                <td>#${o.order_id}</td>
                <td>${o.customer_name || 'Unknown'}</td>
                <td>${o.order_date ? o.order_date.split('T')[0] : ''}</td>
                <td>$${o.total_amount}</td>
                <td>${getBadgeHTML(o.status)}</td>
                <td>
                    <button class="btn btn-danger" onclick="deleteOrder(${o.order_id}, event)">Delete</button>
                </td>
            </tr>
        `).join('') || '<tr><td colspan="6">No orders found</td></tr>';
    } catch(e) {}
}

function viewOrderDetails(id, event) {
    if(event.target.tagName === 'BUTTON') return;
    window.location.href = `/order_details?id=${id}`;
}

async function openOrderModal() {
    orderItems = [];
    renderOrderItems();
    openModal('order-modal');
    try {
        const [customers, products] = await Promise.all([
            apiRequest('/api/Customer'),
            apiRequest('/api/Product')
        ]);
        allProducts = products;
        
        document.getElementById('order-customer').innerHTML = '<option value="">Select Customer</option>' + customers.map(c => `<option value="${c.customer_id}">${c.customer_name}</option>`).join('');
        document.getElementById('product-select').innerHTML = '<option value="">Select Product...</option>' + products.map(p => `<option value="${p.product_id}" data-price="${p.unit_price}">${p.product_name} ($${p.unit_price})</option>`).join('');
    } catch(e) {}
}

function addOrderItem() {
    const sel = document.getElementById('product-select');
    const qtyInput = document.getElementById('product-qty');
    const pid = sel.value;
    const qty = parseInt(qtyInput.value);
    
    if(!pid || !qty || qty <= 0) return;
    
    const product = allProducts.find(p => p.product_id == pid);
    
    orderItems.push({
        product_id: product.product_id,
        product_name: product.product_name,
        price: parseFloat(product.unit_price),
        quantity: qty
    });
    
    sel.value = '';
    qtyInput.value = '';
    renderOrderItems();
}

function removeOrderItem(index) {
    orderItems.splice(index, 1);
    renderOrderItems();
}

function renderOrderItems() {
    const tbody = document.getElementById('order-items-body');
    let total = 0;
    
    tbody.innerHTML = orderItems.map((item, index) => {
        const subtotal = item.price * item.quantity;
        total += subtotal;
        return `
            <tr>
                <td>${item.product_name}</td>
                <td>$${item.price}</td>
                <td>${item.quantity}</td>
                <td>$${subtotal.toFixed(2)}</td>
                <td><button type="button" class="btn btn-danger btn-sm" onclick="removeOrderItem(${index})">X</button></td>
            </tr>
        `;
    }).join('');
    
    document.getElementById('order-total').textContent = total.toFixed(2);
    document.getElementById('btn-submit-order').disabled = orderItems.length === 0;
}

async function submitOrder() {
    const cid = document.getElementById('order-customer').value;
    const total = parseFloat(document.getElementById('order-total').textContent);
    
    if(!cid || orderItems.length === 0) return;
    
    const payload = {
        customer_id: parseInt(cid),
        total_amount: total,
        items: orderItems
    };
    
    try {
        await apiRequest('/api/orders/place', 'POST', payload);
        closeModal('order-modal');
        loadOrders();
    } catch(e) {}
}

async function deleteOrder(id, event) {
    event.stopPropagation();
    if(confirm('Are you sure you want to delete this order?')) {
        try {
            await apiRequest(`/api/Orders/${id}`, 'DELETE');
            loadOrders();
        } catch(e) {}
    }
}

document.addEventListener('DOMContentLoaded', loadOrders);
</script>
{% endblock %}
