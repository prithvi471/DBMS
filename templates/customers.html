{% extends 'base.html' %}

{% block content %}
<div class="header">
    <h1>Customers</h1>
    <button class="btn btn-primary" onclick="openCustomerModal()">Add Customer</button>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Address</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="customers-body">
            <tr><td colspan="6">Loading...</td></tr>
        </tbody>
    </table>
</div>

<!-- Modal -->
<div id="customer-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-title">Add Customer</h2>
            <button class="close-btn" onclick="closeModal('customer-modal')">&times;</button>
        </div>
        <form id="customer-form" onsubmit="event.preventDefault(); saveCustomer();">
            <input type="hidden" name="customer_id" id="customer_id">
            <div class="form-group">
                <label>Customer Name</label>
                <input type="text" name="customer_name" id="customer_name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="number" name="phone" id="phone" class="form-control">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" id="email" class="form-control">
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" name="address" id="address" class="form-control">
            </div>
            <button type="submit" class="btn btn-success">Save</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let editingId = null;

async function loadCustomers() {
    try {
        const data = await apiRequest('/api/Customer');
        const tbody = document.getElementById('customers-body');
        tbody.innerHTML = data.map(c => `
            <tr>
                <td>${c.customer_id}</td>
                <td>${c.customer_name}</td>
                <td>${c.phone || ''}</td>
                <td>${c.email || ''}</td>
                <td>${c.address || ''}</td>
                <td>
                    <button class="btn btn-outline" onclick='editCustomer(${JSON.stringify(c).replace(/'/g, "&apos;")})'>Edit</button>
                    <button class="btn btn-danger" onclick="deleteCustomer(${c.customer_id})">Delete</button>
                </td>
            </tr>
        `).join('') || '<tr><td colspan="6">No customers found</td></tr>';
    } catch(e) {}
}

function openCustomerModal() {
    editingId = null;
    document.getElementById('customer-form').reset();
    document.getElementById('customer_id').value = '';
    document.getElementById('modal-title').textContent = 'Add Customer';
    openModal('customer-modal');
}

function editCustomer(c) {
    editingId = c.customer_id;
    document.getElementById('customer_id').value = c.customer_id;
    document.getElementById('customer_name').value = c.customer_name;
    document.getElementById('phone').value = c.phone;
    document.getElementById('email').value = c.email;
    document.getElementById('address').value = c.address;
    document.getElementById('modal-title').textContent = 'Edit Customer';
    openModal('customer-modal');
}

async function saveCustomer() {
    const data = getFormData('customer-form');
    if (!data.customer_id) delete data.customer_id;
    
    if (editingId) {
        await submitForm(`/api/Customer/${editingId}`, 'PUT', 'customer-form', loadCustomers);
    } else {
        await submitForm('/api/Customer', 'POST', 'customer-form', loadCustomers);
    }
}

async function deleteCustomer(id) {
    if(confirm('Are you sure you want to delete this customer?')) {
        try {
            await apiRequest(`/api/Customer/${id}`, 'DELETE');
            loadCustomers();
        } catch(e) {}
    }
}

document.addEventListener('DOMContentLoaded', loadCustomers);
</script>
{% endblock %}
