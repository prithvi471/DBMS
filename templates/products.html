{% extends 'base.html' %}

{% block content %}
<div class="header">
    <h1>Products</h1>
    <div>
        <select id="category-filter" class="form-control" style="display:inline-block; width:auto; margin-right:10px;" onchange="filterProducts()">
            <option value="">All Categories</option>
        </select>
        <button class="btn btn-primary" onclick="openProductModal()">Add Product</button>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Brand</th>
                <th>Price</th>
                <th>Reorder Level</th>
                <th>Supplier</th>
                <th>Expiry Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="products-body">
            <tr><td colspan="9">Loading...</td></tr>
        </tbody>
    </table>
</div>

<!-- Modal -->
<div id="product-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-title">Add Product</h2>
            <button class="close-btn" onclick="closeModal('product-modal')">&times;</button>
        </div>
        <form id="product-form" onsubmit="event.preventDefault(); saveProduct();">
            <input type="hidden" name="product_id" id="product_id">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="product_name" id="product_name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Category</label>
                <input type="text" name="category" id="category" class="form-control">
            </div>
            <div class="form-group">
                <label>Brand</label>
                <input type="text" name="brand" id="brand" class="form-control">
            </div>
            <div class="form-group">
                <label>Unit Price</label>
                <input type="number" step="0.01" name="unit_price" id="unit_price" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Reorder Level</label>
                <input type="number" name="reorder_level" id="reorder_level" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Supplier</label>
                <select name="supplier_id" id="supplier_id" class="form-control" required>
                    <option value="">Loading suppliers...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Expiry Date</label>
                <input type="date" name="expiry_date" id="expiry_date" class="form-control">
            </div>
            <button type="submit" class="btn btn-success">Save</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let editingId = null;
let allProducts = [];

async function loadProducts() {
    try {
        allProducts = await apiRequest('/api/Product');
        populateCategories();
        renderProducts(allProducts);
        // Load suppliers for select
        const suppliers = await apiRequest('/api/Supplier');
        const sel = document.getElementById('supplier_id');
        sel.innerHTML = '<option value="">Select Supplier</option>' + suppliers.map(s => `<option value="${s.supplier_id}">${s.supplier_name}</option>`).join('');
    } catch(e) {}
}

function populateCategories() {
    const cats = [...new Set(allProducts.map(p => p.category).filter(c => c))];
    const sel = document.getElementById('category-filter');
    const curr = sel.value;
    sel.innerHTML = '<option value="">All Categories</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
    sel.value = curr;
}

function filterProducts() {
    const cat = document.getElementById('category-filter').value;
    if (cat) {
        renderProducts(allProducts.filter(p => p.category === cat));
    } else {
        renderProducts(allProducts);
    }
}

function renderProducts(data) {
    const tbody = document.getElementById('products-body');
    tbody.innerHTML = data.map(p => `
        <tr>
            <td>${p.product_id}</td>
            <td>${p.product_name}</td>
            <td>${p.category || ''}</td>
            <td>${p.brand || ''}</td>
            <td>$${p.unit_price}</td>
            <td>${p.reorder_level}</td>
            <td>${p.supplier_name || p.supplier_id}</td>
            <td>${p.expiry_date ? p.expiry_date.split('T')[0] : ''}</td>
            <td>
                <button class="btn btn-outline" onclick='editProduct(${JSON.stringify(p).replace(/'/g, "&apos;")})'>Edit</button>
                <button class="btn btn-danger" onclick="deleteProduct(${p.product_id})">Delete</button>
            </td>
        </tr>
    `).join('') || '<tr><td colspan="9">No products found</td></tr>';
}

function openProductModal() {
    editingId = null;
    document.getElementById('product-form').reset();
    document.getElementById('product_id').value = '';
    document.getElementById('modal-title').textContent = 'Add Product';
    openModal('product-modal');
}

function editProduct(p) {
    editingId = p.product_id;
    document.getElementById('product_id').value = p.product_id;
    document.getElementById('product_name').value = p.product_name;
    document.getElementById('category').value = p.category;
    document.getElementById('brand').value = p.brand;
    document.getElementById('unit_price').value = p.unit_price;
    document.getElementById('reorder_level').value = p.reorder_level;
    document.getElementById('supplier_id').value = p.supplier_id;
    document.getElementById('expiry_date').value = p.expiry_date ? p.expiry_date.split('T')[0] : '';
    document.getElementById('modal-title').textContent = 'Edit Product';
    openModal('product-modal');
}

async function saveProduct() {
    const data = getFormData('product-form');
    if (!data.product_id) delete data.product_id;
    if (!data.expiry_date) delete data.expiry_date; // Handle empty date
    
    if (editingId) {
        await submitForm(`/api/Product/${editingId}`, 'PUT', 'product-form', loadProducts);
    } else {
        await submitForm('/api/Product', 'POST', 'product-form', loadProducts);
    }
}

async function deleteProduct(id) {
    if(confirm('Are you sure you want to delete this product?')) {
        try {
            await apiRequest(`/api/Product/${id}`, 'DELETE');
            loadProducts();
        } catch(e) {}
    }
}

document.addEventListener('DOMContentLoaded', loadProducts);
</script>
{% endblock %}
